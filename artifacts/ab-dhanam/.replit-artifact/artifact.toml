kind = "web"
previewPath = "/"
title = "A.B. Dhanam Online Services"
version = "1.0.0"
id = "artifacts/ab-dhanam"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26215

[services.development]
run = "pnpm --filter @workspace/ab-dhanam run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ab-dhanam", "run", "build" ]
publicDir = "artifacts/ab-dhanam/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26215"
BASE_PATH = "/"
